<style>
.stepper{display:flex;gap:6px;flex-wrap:wrap;margin:10px 0}
.step{font-size:12px;font-weight:600;padding:6px 11px;border-radius:999px;background:#efeadf;color:var(--muted)}
.step.done{background:#e8f0eb;color:var(--green)} .step.cur{background:var(--accent);color:#fff}
.qa{padding:11px 0;border-bottom:1px solid var(--line)} .qa:last-child{border:none}
.qa .q{font-size:13px;color:var(--muted)} .qa .a{margin-top:3px} .qa .by{font-size:11px;color:var(--accent);font-weight:600;margin-top:3px}
