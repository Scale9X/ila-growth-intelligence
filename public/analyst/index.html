<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>ILAtech — Analyst Workspace</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<style>
.stepper{display:flex;gap:6px;flex-wrap:wrap;margin:10px 0}
.step{font-size:12px;font-weight:600;padding:6px 11px;border-radius:999px;background:#f2f2ef;color:var(--muted)}
.step.done{background:#e7f6ec;color:var(--green)} .step.cur{background:var(--accent);color:#fff}
.qa{padding:11px 0;border-bottom:1px solid var(--line)} .qa:last-child{border:none}
.qa .q{font-size:13px;color:var(--muted)} .qa .a{margin-top:3px} .qa .by{font-size:11px;color:var(--accent);font-weight:600;margin-top:3px}
</style></head>
<body><div id="app"></div>
<script src="../i18n.js"></script>
<script src="data.js"></script>
<script src="app.js"></script></body></html>
